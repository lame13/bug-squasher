name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20.20.2
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run checks
        run: npm run test

      - name: Build
        run: npm run build
